<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — TariffCalc</title>
    <meta name="description" content="The page you're looking for doesn't exist. Try our free US tariff calculator instead.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://tariffcalc.us/404">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="ambient-bg">
        <div class="ambient-orb ambient-orb-1"></div>
        <div class="ambient-orb ambient-orb-2"></div>
    </div>

    <nav id="main-nav" class="navbar"></nav>

    <section class="page-hero" style="padding:160px 0 80px;min-height:70vh;display:flex;align-items:center;">
        <div class="hero-container" style="text-align:center;">
            <span style="font-size:6rem;display:block;margin-bottom:24px;">🔍</span>
            <h1 class="hero-title" style="font-size:clamp(2rem,5vw,3.5rem);margin-bottom:16px;">
                404 — Page Not Found
            </h1>
            <p class="hero-subtitle" style="max-width:600px;margin:0 auto 40px;">
                The page you're looking for doesn't exist or has been moved. But don't worry — you can still calculate your tariff impact below.
            </p>
            <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:48px;">
                <a href="index.html" class="hero-cta" style="text-decoration:none;">🧮 Tariff Calculator</a>
                <a href="how-tariffs-work.html" class="hero-cta" style="text-decoration:none;background:var(--bg-glass);border:1px solid var(--border-subtle);">📖 How Tariffs Work</a>
            </div>

            <div style="max-width:800px;margin:0 auto;">
                <h2 class="section-title" style="font-size:1.5rem;margin-bottom:24px;">Popular Calculators</h2>
                <div class="related-grid" id="popular-calcs"></div>
            </div>
        </div>
    </section>

    <footer id="site-footer" class="site-footer"></footer>

    <script src="tariff-data.js"></script>
    <script src="page-builder.js"></script>
    <script>
        initPage({
            schemas: [
                buildBreadcrumbSchema([
                    { label: 'Home', url: 'index.html' },
                    { label: '404 — Page Not Found' }
                ], 'https://tariffcalc.us/')
            ]
        });

        // Build popular calculators grid
        const grid = document.getElementById('popular-calcs');
        const popular = ALL_PAGES.filter(p => p.priority >= 0.8 && p.url !== 'index.html').slice(0, 6);
        grid.innerHTML = popular.map(p => `
            <a href="${p.url}" class="related-card">
                <span class="related-icon">${p.icon}</span>
                <span class="related-title">${p.shortTitle}</span>
                <span class="related-desc">${p.description}</span>
                <span class="related-arrow">→</span>
            </a>
        `).join('');
    </script>
</body>
</html>
